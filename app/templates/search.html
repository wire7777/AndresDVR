<!DOCTYPE html>
<html>
<head>
    <title>SignalDVR Search</title>
    <style>
        body { background:#111; color:#eee; font-family:Arial; margin:30px; }
        a { color:#4da3ff; }
        input { padding:10px; width:300px; }
        button { padding:10px 14px; border:0; border-radius:6px; cursor:pointer; }
        .card { background:#1d1d1d; border:1px solid #333; border-radius:12px; padding:16px; margin:12px 0; }
        .time { color:#ffd966; }
        .record { background:#c33; color:white; }
        .series { background:#2d7cff; color:white; }
    </style>
</head>
<body>

<h1>🔎 SignalDVR Search</h1>
<p><a href="/">Home</a> | <a href="/guide">Guide</a> | <a href="/grid">Grid</a></p>

<form action="/search" method="get">
    <input name="q" value="{{ q }}" placeholder="Search shows, movies, sports...">
    <button type="submit">Search</button>
</form>

{% for p in results %}
<div class="card">
    <h2>{{ p["title"] }}</h2>

    {% if p["subtitle"] %}
        <p><b>{{ p["subtitle"] }}</b></p>
    {% endif %}

    <p>Channel: {{ p["channel"] }}</p>
    <p class="time">{{ p["start"] }} → {{ p["stop"] }}</p>

    {% if p["description"] %}
        <p>{{ p["description"] }}</p>
    {% endif %}

    <form action="/schedule-program" method="post" style="display:inline;">
        <input type="hidden" name="channel" value="{{ p['channel'] }}">
        <input type="hidden" name="title" value="{{ p['title'] }}">
        <input type="hidden" name="subtitle" value="{{ p['subtitle'] }}">
        <input type="hidden" name="start" value="{{ p['start'] }}">
        <input type="hidden" name="stop" value="{{ p['stop'] }}">
        <button class="record" type="submit">● Record Once</button>
    </form>

    <form action="/series/add" method="post" style="display:inline;">
        <input type="hidden" name="channel" value="{{ p['channel'] }}">
        <input type="hidden" name="title" value="{{ p['title'] }}">
        <button class="series" type="submit">🔁 Record Series</button>
    </form>
</div>
{% endfor %}

</body>
</html>
