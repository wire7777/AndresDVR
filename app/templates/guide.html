<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SignalDVR Guide</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background: #1b1b1b;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        header h1 {
            margin: 0;
            color: #4da3ff;
        }

        header a {
            color: #4da3ff;
            text-decoration: none;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .channel {
            background: #1d1d1d;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 18px;
        }

        .channel h2 {
            margin-top: 0;
            color: white;
        }

        .now {
            color: #66ff88;
            margin-top: 10px;
        }

        .next {
            color: #ffd966;
            margin-bottom: 18px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button {
            display: inline-block;
            padding: 10px 18px;
            background: #2c7be5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .button:hover {
            background: #3d8df5;
        }

        .record {
            background: #cc3333;
        }

        .record:hover {
            background: #e04040;
        }
    </style>

</head>

<body>

    <header>
        <h1>📺 SignalDVR Program Guide</h1>
        <p><a href="/">← Back to Home</a></p>
    </header>

    <div class="container">

        {% for ch in channels %}

        <div class="channel">

            <h2>{{ ch["guide_number"] }} — {{ ch["guide_name"] }}</h2>

            <div class="now">
                <strong>NOW:</strong><br>
                {{ ch["now_title"] or "No Guide Data" }}
            </div>

            <br>

            <div class="next">
                <strong>NEXT:</strong><br>
                {{ ch["next_title"] or "No Guide Data" }}
            </div>

            <div class="buttons">

                <a class="button" href="/guide-view/{{ ch['guide_number'] }}">
                    View Schedule
                </a>

                <form action="/record-channel/{{ ch['guide_number'] }}" method="post" style="display:inline;">

                    <button class="button record" type="submit">
                        ● Record Live
                    </button>

                </form>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
